<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="200" viewBox="0 0 1000 200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="cpanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e3a5c"/><stop offset="1" stop-color="#0a2540"/></linearGradient>
    <linearGradient id="cl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>
    <linearGradient id="cr" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000"/></linearGradient>
    <linearGradient id="ct" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>
    <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000"/></linearGradient>
    <mask id="cfade">
      <rect width="1000" height="200" fill="#fff"/>
      <rect x="0" width="70" height="200" fill="url(#cl)"/>
      <rect x="930" width="70" height="200" fill="url(#cr)"/>
      <rect x="0" y="0" width="1000" height="24" fill="url(#ct)"/>
      <rect x="0" y="176" width="1000" height="24" fill="url(#cb)"/>
    </mask>
  </defs>

  <g mask="url(#cfade)">

    <!-- ============ AI — neural network ============ -->
    <g transform="translate(90,84)">
      <g stroke="#1f6feb" stroke-opacity="0.4" stroke-width="1">
        <line x1="-30" y1="-22" x2="0" y2="-14"/><line x1="-30" y1="-22" x2="0" y2="14"/>
        <line x1="-30" y1="0" x2="0" y2="-14"/><line x1="-30" y1="0" x2="0" y2="14"/>
        <line x1="-30" y1="22" x2="0" y2="-14"/><line x1="-30" y1="22" x2="0" y2="14"/>
        <line x1="0" y1="-14" x2="30" y2="0"/><line x1="0" y1="14" x2="30" y2="0"/>
      </g>
      <g fill="#22d3ee">
        <circle r="2.5"><animateMotion path="M-30 -22 L0 -14 L30 0" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle r="2.5" fill="#58a6ff"><animateMotion path="M-30 22 L0 14 L30 0" dur="2.6s" begin="0.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2.6s" begin="0.7s" repeatCount="indefinite"/></circle>
        <circle r="2.5" fill="#818cf8"><animateMotion path="M-30 0 L0 -14 L30 0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
      </g>
      <g fill="#0d1420" stroke="#58a6ff">
        <circle cx="-30" cy="-22" r="5"/><circle cx="-30" cy="0" r="5"/><circle cx="-30" cy="22" r="5"/>
        <circle cx="0" cy="-14" r="5"/><circle cx="0" cy="14" r="5"/>
        <circle cx="30" cy="0" r="5"/>
      </g>
      <g fill="#22d3ee">
        <circle cx="0" cy="-14" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="30" cy="0" r="2"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
      </g>
      <text x="0" y="52" fill="#7d8590" font-size="11" text-anchor="middle">AI</text>
    </g>

    <!-- ============ Robotics & Autonomous ============ -->
    <g transform="translate(220,84)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.4s" repeatCount="indefinite"/>
        <line x1="0" y1="-24" x2="0" y2="-32" stroke="#3d4b5c" stroke-width="2"/>
        <circle cx="0" cy="-34" r="2.4" fill="#39d353"><animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/></circle>
        <rect x="-18" y="-24" width="36" height="26" rx="6" fill="#161b22" stroke="#30363d"/>
        <rect x="-12" y="-18" width="24" height="12" rx="3" fill="#0a1a2a" stroke="#1f6feb" stroke-opacity="0.6"/>
        <g fill="#22d3ee">
          <circle cx="-6" cy="-12" r="2.4"><animate attributeName="ry" values="2.4;0.4;2.4" dur="3s" repeatCount="indefinite"/></circle>
          <circle cx="6" cy="-12" r="2.4"><animate attributeName="ry" values="2.4;0.4;2.4" dur="3s" repeatCount="indefinite"/></circle>
        </g>
        <rect x="-14" y="4" width="28" height="16" rx="3" fill="#1c2430" stroke="#30363d"/>
        <rect x="-8" y="8" width="16" height="4" rx="1" fill="#0e3a5c" stroke="#1f6feb" stroke-opacity="0.4"/>
      </g>
      <text x="0" y="52" fill="#7d8590" font-size="11" text-anchor="middle">Robotics</text>
    </g>

    <!-- ============ Unmanned Systems — drone ============ -->
    <g transform="translate(350,80)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="2.2s" repeatCount="indefinite"/>
        <g fill="none" stroke="#22d3ee" stroke-opacity="0.7">
          <circle cx="0" cy="6" r="6"><animate attributeName="r" values="6;22" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="2s" repeatCount="indefinite"/></circle>
        </g>
        <g stroke="#3d4b5c" stroke-width="3" stroke-linecap="round">
          <line x1="-10" y1="0" x2="-28" y2="-8"/><line x1="10" y1="0" x2="28" y2="-8"/>
        </g>
        <rect x="-16" y="-4" width="32" height="11" rx="5" fill="#161b22" stroke="#30363d"/>
        <circle cx="0" cy="8" r="1.4" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle>
        <g transform="translate(-28,-8)"><g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.22s" repeatCount="indefinite"/><ellipse rx="13" ry="2" fill="#58a6ff" opacity="0.85"/></g></g>
        <g transform="translate(28,-8)"><g><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="0.22s" repeatCount="indefinite"/><ellipse rx="13" ry="2" fill="#58a6ff" opacity="0.85"/></g></g>
      </g>
      <text x="0" y="56" fill="#7d8590" font-size="11" text-anchor="middle">Unmanned</text>
    </g>

    <!-- ============ Real-Time Systems — oscilloscope ============ -->
    <g transform="translate(480,84)">
      <rect x="-34" y="-24" width="68" height="44" rx="5" fill="#08131f" stroke="#1f6feb" stroke-opacity="0.6"/>
      <g stroke="#1f6feb" stroke-opacity="0.15"><line x1="-34" y1="-2" x2="34" y2="-2"/><line x1="0" y1="-24" x2="0" y2="20"/></g>
      <clipPath id="scope"><rect x="-34" y="-24" width="68" height="44" rx="5"/></clipPath>
      <g clip-path="url(#scope)">
        <path d="M-90 -2 Q-80 -18 -70 -2 T-50 -2 Q-40 -18 -30 -2 T-10 -2 Q0 -18 10 -2 T30 -2 Q40 -18 50 -2 T70 -2 Q80 -18 90 -2 T110 -2" fill="none" stroke="#39d353" stroke-width="2">
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-40 0" dur="1.1s" repeatCount="indefinite"/>
        </path>
      </g>
      <circle cx="0" cy="-2" r="2.5" fill="#39d353"><animate attributeName="opacity" values="1;0.3;1" dur="0.6s" repeatCount="indefinite"/></circle>
      <text x="0" y="52" fill="#7d8590" font-size="11" text-anchor="middle">Real-Time</text>
    </g>

    <!-- ============ Product Engineering — gears ============ -->
    <g transform="translate(610,82)">
      <g transform="translate(-10,0)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
        <g fill="#4b5563">
          <rect x="-3" y="-22" width="6" height="8" rx="1"/><rect x="-3" y="14" width="6" height="8" rx="1"/>
          <rect x="-22" y="-3" width="8" height="6" rx="1"/><rect x="14" y="-3" width="8" height="6" rx="1"/>
          <rect x="-3" y="-22" width="6" height="8" rx="1" transform="rotate(45)"/><rect x="-3" y="14" width="6" height="8" rx="1" transform="rotate(45)"/>
          <rect x="-22" y="-3" width="8" height="6" rx="1" transform="rotate(45)"/><rect x="14" y="-3" width="8" height="6" rx="1" transform="rotate(45)"/>
        </g>
        <circle r="14" fill="#1c2430" stroke="#4b5563" stroke-width="2"/>
        <circle r="5" fill="#08131f" stroke="#1f6feb"/>
      </g>
      <g transform="translate(18,14)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4.4s" repeatCount="indefinite"/>
        <g fill="#3d4b5c">
          <rect x="-2.5" y="-16" width="5" height="6" rx="1"/><rect x="-2.5" y="10" width="5" height="6" rx="1"/>
          <rect x="-16" y="-2.5" width="6" height="5" rx="1"/><rect x="10" y="-2.5" width="6" height="5" rx="1"/>
          <rect x="-2.5" y="-16" width="5" height="6" rx="1" transform="rotate(45)"/><rect x="-2.5" y="10" width="5" height="6" rx="1" transform="rotate(45)"/>
          <rect x="-16" y="-2.5" width="6" height="5" rx="1" transform="rotate(45)"/><rect x="10" y="-2.5" width="6" height="5" rx="1" transform="rotate(45)"/>
        </g>
        <circle r="10" fill="#1c2430" stroke="#3d4b5c" stroke-width="2"/>
        <circle r="3.5" fill="#08131f" stroke="#1f6feb"/>
      </g>
      <text x="0" y="52" fill="#7d8590" font-size="11" text-anchor="middle">Product Eng</text>
    </g>

    <!-- ============ End-to-End Solutions — pipeline ============ -->
    <g transform="translate(740,84)">
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#1f6feb" stroke-opacity="0.4" stroke-width="1.5"/>
      <g fill="#0d1420" stroke="#58a6ff">
        <rect x="-38" y="-9" width="16" height="18" rx="3"/>
        <rect x="-8" y="-9" width="16" height="18" rx="3"/>
        <rect x="22" y="-9" width="16" height="18" rx="3"/>
      </g>
      <circle r="3" fill="#39d353"><animateMotion path="M-30 0 H30" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/></circle>
      <circle r="3" fill="#22d3ee"><animateMotion path="M-30 0 H30" dur="2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
      <g fill="#22d3ee">
        <circle cx="-30" cy="0" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
        <circle cx="30" cy="0" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/></circle>
      </g>
      <text x="0" y="52" fill="#7d8590" font-size="11" text-anchor="middle">End-to-End</text>
    </g>

    <!-- ============ Embedded Systems — microchip ============ -->
    <g transform="translate(870,84)">
      <g stroke="#3d4b5c" stroke-width="2">
        <line x1="-26" y1="-12" x2="-18" y2="-12"/><line x1="-26" y1="0" x2="-18" y2="0"/><line x1="-26" y1="12" x2="-18" y2="12"/>
        <line x1="18" y1="-12" x2="26" y2="-12"/><line x1="18" y1="0" x2="26" y2="0"/><line x1="18" y1="12" x2="26" y2="12"/>
        <line x1="-12" y1="-18" x2="-12" y2="-26"/><line x1="0" y1="-18" x2="0" y2="-26"/><line x1="12" y1="-18" x2="12" y2="-26"/>
        <line x1="-12" y1="18" x2="-12" y2="26"/><line x1="0" y1="18" x2="0" y2="26"/><line x1="12" y1="18" x2="12" y2="26"/>
      </g>
      <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#0a1a2a" stroke="#1f6feb" stroke-opacity="0.6"/>
      <text x="0" y="4" fill="#22d3ee" font-size="9" text-anchor="middle" font-weight="700">CPU</text>
      <g fill="#39d353">
        <circle cx="-18" cy="-12" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite"/></circle>
        <circle cx="18" cy="0" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="0.5s" repeatCount="indefinite"/></circle>
        <circle cx="0" cy="18" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="1s" repeatCount="indefinite"/></circle>
      </g>
      <text x="0" y="52" fill="#7d8590" font-size="11" text-anchor="middle">Embedded</text>
    </g>

  </g>
</svg>
