<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="150" viewBox="0 0 1000 150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#f8fafc" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="fglow" cx="0.5" cy="1" r="0.9">
      <stop offset="0" stop-color="#5b8dd9" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#5b8dd9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fpanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b9d4ee"/><stop offset="1" stop-color="#cfe2f3"/></linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>
    <linearGradient id="hr" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000"/></linearGradient>
    <linearGradient id="htp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>
    <mask id="hfade">
      <rect width="1000" height="150" fill="#fff"/>
      <rect x="0" width="110" height="150" fill="url(#hl)"/>
      <rect x="890" width="110" height="150" fill="url(#hr)"/>
      <rect x="0" y="0" width="1000" height="34" fill="url(#htp)"/>
    </mask>
  </defs>

  <g mask="url(#hfade)">
    <rect width="1000" height="150" fill="url(#fsky)"/>
    <rect x="0" y="70" width="1000" height="120" fill="url(#fglow)"/>

    <!-- stars -->
    <g fill="#8496b3">
      <circle cx="140" cy="30" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="430" cy="22" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="34" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="880" cy="24" r="1"><animate attributeName="opacity" values="1;0.25;1" dur="2.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- slow satellite -->
    <g>
      <animateTransform attributeName="transform" type="translate" from="1120 0" to="-140 0" dur="34s" repeatCount="indefinite"/>
      <g transform="translate(0,40)">
        <rect x="-7" y="-5" width="14" height="10" rx="2" fill="#eef1f5" stroke="#6e7c8a"/>
        <rect x="-26" y="-4" width="16" height="8" rx="1" fill="url(#fpanel)" stroke="#5b8dd9" stroke-opacity="0.6"/>
        <rect x="10" y="-4" width="16" height="8" rx="1" fill="url(#fpanel)" stroke="#5b8dd9" stroke-opacity="0.6"/>
        <circle cx="0" cy="-9" r="1.4" fill="#b08800"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- ground -->
    <line x1="0" y1="118" x2="1000" y2="118" stroke="#5b8dd9" stroke-opacity="0.35"/>
    <g fill="#e8edf2" stroke="#b3c0cd"><ellipse cx="250" cy="132" rx="12" ry="3"/><ellipse cx="760" cy="138" rx="14" ry="3.5"/></g>

    <!-- comms towers with expanding signal rings -->
    <g transform="translate(180,118)">
      <line x1="0" y1="0" x2="0" y2="-40" stroke="#5f6f80" stroke-width="3"/>
      <line x1="0" y1="-30" x2="-9" y2="-16" stroke="#5f6f80" stroke-width="2"/>
      <line x1="0" y1="-30" x2="9" y2="-16" stroke="#5f6f80" stroke-width="2"/>
      <circle cx="0" cy="-42" r="2.4" fill="#188038"><animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/></circle>
      <g fill="none" stroke="#0e93ad">
        <circle cx="0" cy="-42" r="6"><animate attributeName="r" values="6;30" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="2.4s" repeatCount="indefinite"/></circle>
        <circle cx="0" cy="-42" r="6"><animate attributeName="r" values="6;30" dur="2.4s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
      </g>
    </g>
    <g transform="translate(820,118)">
      <line x1="0" y1="0" x2="0" y2="-34" stroke="#5f6f80" stroke-width="3"/>
      <line x1="0" y1="-26" x2="-8" y2="-14" stroke="#5f6f80" stroke-width="2"/>
      <line x1="0" y1="-26" x2="8" y2="-14" stroke="#5f6f80" stroke-width="2"/>
      <circle cx="0" cy="-36" r="2.2" fill="#b08800"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.3s" repeatCount="indefinite"/></circle>
      <g fill="none" stroke="#5b62d9">
        <circle cx="0" cy="-36" r="6"><animate attributeName="r" values="6;26" dur="2.8s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- rover convoy -->
    <g>
      <animateTransform attributeName="transform" type="translate" from="-140 0" to="1140 0" dur="30s" repeatCount="indefinite"/>
      <g transform="translate(0,118)">
        <animateTransform attributeName="transform" type="translate" values="0 118; 0 117; 0 118" dur="0.8s" repeatCount="indefinite" additive="sum"/>
        <rect x="-26" y="-16" width="52" height="13" rx="4" fill="#eef1f5" stroke="#6e7c8a"/>
        <rect x="-20" y="-24" width="40" height="7" rx="2" fill="url(#fpanel)" stroke="#5b8dd9" stroke-opacity="0.6"/>
        <line x1="14" y1="-24" x2="14" y2="-36" stroke="#5f6f80" stroke-width="2.5"/>
        <circle cx="14" cy="-38" r="1.8" fill="#0e93ad"><animate attributeName="opacity" values="1;0.3;1" dur="1.1s" repeatCount="indefinite"/></circle>
        <g transform="translate(-16,0)"><circle r="7" fill="#e8edf2" stroke="#5a636d" stroke-width="2"/><g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/><line x1="-7" y1="0" x2="7" y2="0" stroke="#6b7686" stroke-width="1.6"/><line x1="0" y1="-7" x2="0" y2="7" stroke="#6b7686" stroke-width="1.6"/></g></g>
        <g transform="translate(16,0)"><circle r="7" fill="#e8edf2" stroke="#5a636d" stroke-width="2"/><g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/><line x1="-7" y1="0" x2="7" y2="0" stroke="#6b7686" stroke-width="1.6"/><line x1="0" y1="-7" x2="0" y2="7" stroke="#6b7686" stroke-width="1.6"/></g></g>
      </g>
    </g>

    <!-- rocket: sits on pad, lifts off, fades, loops -->
    <g transform="translate(560,118)">
      <!-- launch pad -->
      <rect x="-10" y="-2" width="20" height="3" rx="1" fill="#e3e9ef" stroke="#6e7c8a"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 0; 0 -150; 0 -150" keyTimes="0;0.3;0.72;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1; 0.5 0 0.9 0.4; 0 0 1 1"/>
        <animate attributeName="opacity" values="1;1;1;0;0" keyTimes="0;0.3;0.6;0.72;1" dur="9s" repeatCount="indefinite"/>
        <!-- body -->
        <path d="M0 -34 C4 -30 5 -24 5 -16 L5 -6 L-5 -6 L-5 -16 C-5 -24 -4 -30 0 -34 Z" fill="#2a323c" stroke="#6e7c8a"/>
        <circle cx="0" cy="-20" r="2.6" fill="#b9d4ee" stroke="#5b8dd9"/>
        <!-- fins -->
        <path d="M-5 -12 L-9 -4 L-5 -6 Z" fill="#2b6fdb" stroke="#6e7c8a" stroke-width="0.6"/>
        <path d="M5 -12 L9 -4 L5 -6 Z" fill="#2b6fdb" stroke="#6e7c8a" stroke-width="0.6"/>
        <!-- flame (flickers, only during burn) -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.28;0.32;0.68;0.72;1" dur="9s" repeatCount="indefinite"/>
          <path d="M-3 -6 L0 6 L3 -6 Z" fill="#b08800"><animate attributeName="d" values="M-3 -6 L0 6 L3 -6 Z; M-3 -6 L0 10 L3 -6 Z; M-3 -6 L0 6 L3 -6 Z" dur="0.16s" repeatCount="indefinite"/></path>
          <path d="M-1.6 -6 L0 2 L1.6 -6 Z" fill="#0e93ad"><animate attributeName="d" values="M-1.6 -6 L0 2 L1.6 -6 Z; M-1.6 -6 L0 5 L1.6 -6 Z; M-1.6 -6 L0 2 L1.6 -6 Z" dur="0.12s" repeatCount="indefinite"/></path>
        </g>
      </g>
      <!-- smoke puffs on ignition -->
      <g fill="#57606a">
        <circle cx="-8" cy="-2" r="2"><animate attributeName="r" values="0;0;5;0" keyTimes="0;0.3;0.5;1" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.35;0" keyTimes="0;0.3;0.45;1" dur="9s" repeatCount="indefinite"/></circle>
        <circle cx="8" cy="-2" r="2"><animate attributeName="r" values="0;0;5;0" keyTimes="0;0.32;0.52;1" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.35;0" keyTimes="0;0.32;0.47;1" dur="9s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- status line -->
    <text x="500" y="146" fill="#188038" font-size="11" text-anchor="middle" opacity="0.85">◦ all systems online</text>
  </g>
</svg>
