<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="0.6" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#080b10"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11202e"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="horizon" cx="0.5" cy="1" r="0.8">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e3a5c"/>
      <stop offset="1" stop-color="#0a2540"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1000" height="340" rx="14" fill="url(#sky)"/>
  <rect x="0.5" y="0.5" width="999" height="339" rx="14" fill="none" stroke="#1f6feb" stroke-opacity="0.4"/>

  <!-- faint tech grid -->
  <g stroke="#1f6feb" stroke-opacity="0.06">
    <path d="M0 40H1000M0 80H1000M0 120H1000M0 160H1000M0 200H1000M0 240H1000M0 280H1000"/>
    <path d="M60 0V340M140 0V340M220 0V340M300 0V340M380 0V340M460 0V340M540 0V340M620 0V340M700 0V340M780 0V340M860 0V340M940 0V340"/>
  </g>

  <!-- twinkling stars -->
  <g fill="#9fb4d8">
    <circle cx="120" cy="46" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="30" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="52" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="26" r="1"><animate attributeName="opacity" values="1;0.25;1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="60" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="34" r="1"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="70" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="72" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="3.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ground -->
  <rect x="0" y="286" width="1000" height="54" fill="url(#ground)"/>
  <rect x="0" y="286" width="1000" height="120" fill="url(#horizon)"/>
  <line x1="0" y1="286" x2="1000" y2="286" stroke="#1f6feb" stroke-opacity="0.35"/>
  <!-- surface rocks / craters -->
  <g fill="#0f1826" stroke="#1f2d3d" stroke-width="1">
    <ellipse cx="150" cy="312" rx="10" ry="3"/>
    <ellipse cx="470" cy="322" rx="14" ry="4"/>
    <ellipse cx="820" cy="308" rx="9" ry="3"/>
    <ellipse cx="640" cy="330" rx="12" ry="3.5"/>
  </g>

  <!-- ================= RADAR / SENSING (right) ================= -->
  <g transform="translate(858,150)">
    <circle r="52" fill="#0a1a2a" stroke="#1f6feb" stroke-opacity="0.5"/>
    <circle r="35" fill="none" stroke="#1f6feb" stroke-opacity="0.25"/>
    <circle r="18" fill="none" stroke="#1f6feb" stroke-opacity="0.25"/>
    <line x1="-52" y1="0" x2="52" y2="0" stroke="#1f6feb" stroke-opacity="0.2"/>
    <line x1="0" y1="-52" x2="0" y2="52" stroke="#1f6feb" stroke-opacity="0.2"/>
    <!-- sweeping wedge -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <path d="M0 0 L52 0 A52 52 0 0 0 36 -37 Z" fill="#22d3ee" opacity="0.28"/>
      <line x1="0" y1="0" x2="52" y2="0" stroke="#22d3ee" stroke-width="1.5"/>
    </g>
    <!-- blips -->
    <circle cx="20" cy="-14" r="2.4" fill="#39d353"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="-26" cy="10" r="2.4" fill="#39d353"><animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="8" cy="30" r="2.4" fill="#f2cc60"><animate attributeName="opacity" values="0;1;0" dur="4s" begin="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ================= DRONE (flies across top) ================= -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-170 0" to="1180 0" dur="16s" repeatCount="indefinite"/>
    <g>
      <!-- gentle bob -->
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 10; 0 0" dur="2.6s" repeatCount="indefinite"/>

      <!-- signal pulses -->
      <g fill="none" stroke="#22d3ee">
        <circle cx="0" cy="52" r="10"><animate attributeName="r" values="10;40" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="0" cy="52" r="10"><animate attributeName="r" values="10;40" dur="2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
      </g>

      <!-- arms -->
      <g stroke="#3d4b5c" stroke-width="4" stroke-linecap="round">
        <line x1="-16" y1="50" x2="-46" y2="36"/>
        <line x1="16" y1="50" x2="46" y2="36"/>
        <line x1="-16" y1="56" x2="-46" y2="70"/>
        <line x1="16" y1="56" x2="46" y2="70"/>
      </g>
      <!-- body -->
      <rect x="-26" y="44" width="52" height="16" rx="7" fill="#161b22" stroke="#30363d"/>
      <rect x="-10" y="47" width="20" height="10" rx="3" fill="#0e3a5c" stroke="#1f6feb"/>
      <!-- gimbal camera -->
      <circle cx="0" cy="63" r="4.5" fill="#0a0e14" stroke="#30363d"/>
      <circle cx="0" cy="63" r="1.6" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
      <!-- status LED -->
      <circle cx="18" cy="49" r="1.8" fill="#39d353"><animate attributeName="opacity" values="1;0.2;1" dur="0.9s" repeatCount="indefinite"/></circle>

      <!-- propellers (spin fast) -->
      <g transform="translate(-46,36)">
        <circle r="4" fill="#30363d"/>
        <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.2s" repeatCount="indefinite"/>
          <ellipse rx="22" ry="2.6" fill="#58a6ff" opacity="0.8"/></g>
      </g>
      <g transform="translate(46,36)">
        <circle r="4" fill="#30363d"/>
        <g><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="0.2s" repeatCount="indefinite"/>
          <ellipse rx="22" ry="2.6" fill="#58a6ff" opacity="0.8"/></g>
      </g>
      <g transform="translate(-46,70)">
        <circle r="4" fill="#30363d"/>
        <g><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="0.22s" repeatCount="indefinite"/>
          <ellipse rx="22" ry="2.6" fill="#818cf8" opacity="0.8"/></g>
      </g>
      <g transform="translate(46,70)">
        <circle r="4" fill="#30363d"/>
        <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.22s" repeatCount="indefinite"/>
          <ellipse rx="22" ry="2.6" fill="#818cf8" opacity="0.8"/></g>
      </g>
    </g>
  </g>

  <!-- ================= ROVER (drives across ground) ================= -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-160 0" to="1160 0" dur="26s" repeatCount="indefinite"/>
    <g transform="translate(0,276)">
      <!-- gentle suspension jitter -->
      <animateTransform attributeName="transform" type="translate" values="0 276; 0 274; 0 276" dur="0.9s" repeatCount="indefinite" additive="sum"/>

      <!-- solar panel -->
      <rect x="-38" y="-30" width="76" height="9" rx="2" fill="url(#panel)" stroke="#1f6feb" stroke-opacity="0.6"/>
      <g stroke="#1f6feb" stroke-opacity="0.35"><line x1="-19" y1="-30" x2="-19" y2="-21"/><line x1="0" y1="-30" x2="0" y2="-21"/><line x1="19" y1="-30" x2="19" y2="-21"/></g>

      <!-- mast + sensor head -->
      <line x1="24" y1="-30" x2="24" y2="-50" stroke="#3d4b5c" stroke-width="3"/>
      <rect x="16" y="-58" width="18" height="10" rx="2" fill="#161b22" stroke="#30363d"/>
      <circle cx="20" cy="-53" r="2" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="30" cy="-53" r="1.6" fill="#f2cc60"/>
      <!-- little scan beam from head -->
      <path d="M34 -53 L70 -60 L70 -46 Z" fill="#22d3ee" opacity="0.12"/>

      <!-- chassis -->
      <rect x="-40" y="-20" width="80" height="20" rx="5" fill="#161b22" stroke="#30363d"/>
      <rect x="-30" y="-16" width="26" height="12" rx="2" fill="#0e3a5c" stroke="#1f6feb" stroke-opacity="0.5"/>
      <rect x="2" y="-16" width="30" height="12" rx="2" fill="#0a1a2a" stroke="#1f6feb" stroke-opacity="0.4"/>

      <!-- rocker-bogie struts -->
      <g stroke="#3d4b5c" stroke-width="3" stroke-linecap="round">
        <line x1="-24" y1="0" x2="-30" y2="12"/><line x1="-24" y1="0" x2="-6" y2="12"/>
        <line x1="26" y1="0" x2="8" y2="12"/><line x1="26" y1="0" x2="30" y2="12"/>
      </g>

      <!-- wheels (spin) -->
      <g>
        <g transform="translate(-30,14)">
          <circle r="10" fill="#0f1826" stroke="#4b5563" stroke-width="2.5"/>
          <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.1s" repeatCount="indefinite"/>
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#6b7686" stroke-width="2"/>
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#6b7686" stroke-width="2"/></g>
        </g>
        <g transform="translate(-6,14)">
          <circle r="10" fill="#0f1826" stroke="#4b5563" stroke-width="2.5"/>
          <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.1s" repeatCount="indefinite"/>
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#6b7686" stroke-width="2"/>
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#6b7686" stroke-width="2"/></g>
        </g>
        <g transform="translate(30,14)">
          <circle r="10" fill="#0f1826" stroke="#4b5563" stroke-width="2.5"/>
          <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.1s" repeatCount="indefinite"/>
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#6b7686" stroke-width="2"/>
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#6b7686" stroke-width="2"/></g>
        </g>
      </g>
    </g>
  </g>

  <!-- ================= ROBOTIC ARM (left, articulating) ================= -->
  <g transform="translate(70,286)">
    <rect x="-16" y="-6" width="32" height="10" rx="2" fill="#161b22" stroke="#30363d"/>
    <circle cx="0" cy="-6" r="5" fill="#0e3a5c" stroke="#1f6feb"/>
    <!-- lower arm -->
    <g transform="rotate(-30)">
      <animateTransform attributeName="transform" type="rotate" values="-30;-8;-30" dur="5s" repeatCount="indefinite"/>
      <rect x="-4" y="-52" width="8" height="52" rx="3" fill="#1c2430" stroke="#3d4b5c"/>
      <circle cx="0" cy="-52" r="5" fill="#0e3a5c" stroke="#1f6feb"/>
      <!-- upper arm -->
      <g transform="translate(0,-52) rotate(50)">
        <animateTransform attributeName="transform" type="rotate" values="50;20;50" dur="5s" repeatCount="indefinite" additive="sum"/>
        <rect x="-3.5" y="-44" width="7" height="44" rx="3" fill="#1c2430" stroke="#3d4b5c"/>
        <!-- gripper -->
        <g transform="translate(0,-44)">
          <line x1="0" y1="0" x2="-6" y2="-8" stroke="#6b7686" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="0" y1="0" x2="6" y2="-8" stroke="#6b7686" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="0" cy="-2" r="2" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/></circle>
        </g>
      </g>
    </g>
  </g>

  <!-- ================= TITLE (types in) ================= -->
  <g>
    <clipPath id="wipe"><rect x="120" y="120" height="70" width="0"><animate attributeName="width" from="0" to="470" begin="0.3s" dur="1.1s" fill="freeze"/></rect></clipPath>
    <g clip-path="url(#wipe)">
      <text x="120" y="164" font-size="46" font-weight="700" fill="url(#ink)">Shikhar Jaiswal</text>
    </g>
    <!-- typing cursor -->
    <rect x="120" y="132" width="12" height="34" fill="#22d3ee">
      <animate attributeName="x" from="124" to="596" begin="0.3s" dur="1.1s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="0.9s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- subtitle lines (fade in) -->
  <text x="122" y="196" font-size="19" fill="#c9d1d9" opacity="0">
    Building intelligent, real-world systems
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.6s" fill="freeze"/>
  </text>
  <text x="122" y="222" font-size="14" fill="#7d8590" opacity="0">
    <tspan fill="#22d3ee">AI</tspan> • <tspan fill="#58a6ff">Robotics</tspan> • <tspan fill="#818cf8">Unmanned Systems</tspan> • <tspan fill="#39d353">Emerging Technologies</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.6s" fill="freeze"/>
  </text>
</svg>
