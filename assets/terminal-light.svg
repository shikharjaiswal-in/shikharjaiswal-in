<svg xmlns="http://www.w3.org/2000/svg" width="800" height="330" viewBox="0 0 800 330" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="abar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e93ad"/><stop offset="1" stop-color="#5b62d9"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#8d99a8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- window card (floats on a soft shadow) -->
  <g filter="url(#sh)">
    <rect x="20" y="8" width="760" height="304" rx="14" fill="url(#tbg)"/>
    <rect x="20.5" y="8.5" width="759" height="303" rx="14" fill="none" stroke="#d0d7de"/>
  </g>
  <line x1="20" y1="44" x2="780" y2="44" stroke="#d0d7de"/>
  <circle cx="44" cy="26" r="5.5" fill="#ff5f56"/><circle cx="62" cy="26" r="5.5" fill="#ffbd2e"/><circle cx="80" cy="26" r="5.5" fill="#27c93f"/>
  <text x="400" y="30" fill="#57606a" font-size="12.5" text-anchor="middle">shikhar@github: ~/portfolio</text>

  <!-- $ whoami -->
  <clipPath id="t1"><rect x="48" y="56" height="20" width="0"><animate attributeName="width" from="0" to="130" begin="0.3s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t1)">
    <text x="48" y="72" font-size="13.5"><tspan fill="#1a7f37">$</tspan><tspan fill="#24292f"> whoami</tspan></text>
  </g>

  <!-- name with accent bar -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.3s" fill="freeze"/>
    <rect x="48" y="82" width="3.5" height="16" rx="1.5" fill="url(#abar)"/>
    <text x="60" y="95" font-size="15" font-weight="700" fill="#1f2328">Shikhar Jaiswal</text>
  </g>

  <!-- $ cat focus.txt -->
  <clipPath id="t2"><rect x="48" y="104" height="20" width="0"><animate attributeName="width" from="0" to="170" begin="1.4s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t2)">
    <text x="48" y="120" font-size="13.5"><tspan fill="#1a7f37">$</tspan><tspan fill="#24292f"> cat focus.txt</tspan></text>
  </g>

  <!-- focus output -->
  <text x="48" y="144" font-size="13.5" opacity="0">
    <tspan fill="#0e93ad">AI</tspan><tspan fill="#57606a">  •  </tspan><tspan fill="#2b6fdb">Robotics</tspan><tspan fill="#57606a">  •  </tspan><tspan fill="#5b62d9">Unmanned Systems</tspan><tspan fill="#57606a">  •  </tspan><tspan fill="#1a7f37">Emerging Technologies</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.95s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- build pipeline command -->
  <clipPath id="t3"><rect x="48" y="152" height="20" width="0"><animate attributeName="width" from="0" to="200" begin="2.5s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t3)">
    <text x="48" y="168" font-size="13.5"><tspan fill="#1a7f37">$</tspan><tspan fill="#24292f"> ./build --pipeline</tspan></text>
  </g>

  <!-- pipeline output -->
  <text x="48" y="192" font-size="13.5" fill="#24292f" opacity="0">
    concept <tspan fill="#0e93ad">→</tspan> prototype <tspan fill="#0e93ad">→</tspan> scalable platforms
    <animate attributeName="opacity" from="0" to="1" begin="3.05s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- progress bar row -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.2s" fill="freeze"/>
    <rect x="48" y="202" width="300" height="8" rx="4" fill="#d9e5f1" stroke="#d0d7de" stroke-width="0.8"/>
    <rect x="49.5" y="203.5" width="0" height="5" rx="2.5" fill="#1a7f37">
      <animate attributeName="width" from="0" to="297" begin="3.45s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <text x="358" y="210" font-size="12" fill="#1a7f37" opacity="0">100%  ✓ deployed<animate attributeName="opacity" from="0" to="1" begin="4.35s" dur="0.25s" fill="freeze"/></text>
  </g>

  <!-- status availability command -->
  <clipPath id="t4"><rect x="48" y="220" height="20" width="0"><animate attributeName="width" from="0" to="220" begin="4.7s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t4)">
    <text x="48" y="236" font-size="13.5"><tspan fill="#1a7f37">$</tspan><tspan fill="#24292f"> status --availability</tspan></text>
  </g>

  <!-- availability output -->
  <g opacity="0" font-size="13.5">
    <animate attributeName="opacity" from="0" to="1" begin="5.25s" dur="0.3s" fill="freeze"/>
    <circle cx="54" cy="255" r="3.5" fill="#1a7f37"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="5.3s" repeatCount="indefinite"/></circle>
    <text x="65" y="260" fill="#24292f">freelancing</text>
    <circle cx="188" cy="255" r="3.5" fill="#1a7f37"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="5.6s" repeatCount="indefinite"/></circle>
    <text x="199" y="260" fill="#24292f">consulting</text>
    <circle cx="314" cy="255" r="3.5" fill="#1a7f37"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="5.9s" repeatCount="indefinite"/></circle>
    <text x="325" y="260" fill="#24292f">collaboration</text>
  </g>

  <!-- idle prompt + blinking cursor -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.7s" dur="0.2s" fill="freeze"/>
    <text x="48" y="290" font-size="13.5" fill="#1a7f37">$</text>
    <rect x="62" y="278" width="8.5" height="15" rx="1" fill="#24292f">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" begin="5.7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
