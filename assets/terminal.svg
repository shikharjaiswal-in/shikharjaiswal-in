<svg xmlns="http://www.w3.org/2000/svg" width="680" height="268" viewBox="0 0 680 268" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111722"/><stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- window (a terminal is deliberately a window — the one framed element) -->
  <rect width="680" height="268" rx="12" fill="url(#tbg)"/>
  <rect x="0.5" y="0.5" width="679" height="267" rx="12" fill="none" stroke="#30363d"/>
  <line x1="0" y1="30" x2="680" y2="30" stroke="#30363d"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f56"/><circle cx="36" cy="15" r="5" fill="#ffbd2e"/><circle cx="52" cy="15" r="5" fill="#27c93f"/>
  <text x="340" y="19" fill="#7d8590" font-size="12" text-anchor="middle">shikhar@github: ~/portfolio</text>

  <!-- line 1: $ whoami -->
  <clipPath id="t1"><rect x="20" y="44" height="18" width="0"><animate attributeName="width" from="0" to="120" begin="0.3s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t1)">
    <text x="20" y="58" font-size="13"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> whoami</tspan></text>
  </g>

  <!-- line 2: name -->
  <text x="20" y="80" font-size="14" font-weight="700" fill="#e6edf3" opacity="0">
    Shikhar Jaiswal
    <animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.25s" fill="freeze"/>
  </text>

  <!-- line 3: $ cat focus.txt -->
  <clipPath id="t2"><rect x="20" y="92" height="18" width="0"><animate attributeName="width" from="0" to="160" begin="1.3s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t2)">
    <text x="20" y="106" font-size="13"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> cat focus.txt</tspan></text>
  </g>

  <!-- line 4: focus output -->
  <text x="20" y="128" font-size="13" opacity="0">
    <tspan fill="#22d3ee">AI</tspan><tspan fill="#7d8590"> • </tspan><tspan fill="#58a6ff">Robotics</tspan><tspan fill="#7d8590"> • </tspan><tspan fill="#818cf8">Unmanned Systems</tspan><tspan fill="#7d8590"> • </tspan><tspan fill="#39d353">Emerging Technologies</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.85s" dur="0.25s" fill="freeze"/>
  </text>

  <!-- line 5: build pipeline command -->
  <clipPath id="t3"><rect x="20" y="140" height="18" width="0"><animate attributeName="width" from="0" to="190" begin="2.3s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t3)">
    <text x="20" y="154" font-size="13"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> ./build --pipeline</tspan></text>
  </g>

  <!-- line 6: pipeline output + progress bar -->
  <text x="20" y="176" font-size="13" fill="#c9d1d9" opacity="0">
    concept <tspan fill="#22d3ee">→</tspan> prototype <tspan fill="#22d3ee">→</tspan> scalable platforms
    <animate attributeName="opacity" from="0" to="1" begin="2.85s" dur="0.25s" fill="freeze"/>
  </text>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.2s" fill="freeze"/>
    <rect x="356" y="166" width="120" height="10" rx="3" fill="#0a1a2a" stroke="#30363d"/>
    <rect x="358" y="168" width="0" height="6" rx="2" fill="#39d353">
      <animate attributeName="width" from="0" to="116" begin="3.2s" dur="0.9s" fill="freeze"/>
    </rect>
    <text x="484" y="175" font-size="11" fill="#39d353" opacity="0">100%<animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.2s" fill="freeze"/></text>
  </g>

  <!-- line 7: status availability command -->
  <clipPath id="t4"><rect x="20" y="188" height="18" width="0"><animate attributeName="width" from="0" to="210" begin="4.4s" dur="0.35s" fill="freeze"/></rect></clipPath>
  <g clip-path="url(#t4)">
    <text x="20" y="202" font-size="13"><tspan fill="#39d353">$</tspan><tspan fill="#c9d1d9"> status --availability</tspan></text>
  </g>

  <!-- line 8: availability output (pulsing dots) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.95s" dur="0.25s" fill="freeze"/>
    <circle cx="26" cy="219" r="3" fill="#39d353"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="5s" repeatCount="indefinite"/></circle>
    <text x="35" y="223" font-size="13" fill="#c9d1d9">freelancing</text>
    <circle cx="146" cy="219" r="3" fill="#39d353"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="5.3s" repeatCount="indefinite"/></circle>
    <text x="155" y="223" font-size="13" fill="#c9d1d9">consulting</text>
    <circle cx="256" cy="219" r="3" fill="#39d353"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="5.6s" repeatCount="indefinite"/></circle>
    <text x="265" y="223" font-size="13" fill="#c9d1d9">collaboration</text>
  </g>

  <!-- line 9: idle prompt + blinking cursor -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.4s" dur="0.2s" fill="freeze"/>
    <text x="20" y="248" font-size="13" fill="#39d353">$</text>
    <rect x="34" y="237" width="8" height="14" fill="#c9d1d9">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" begin="5.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
